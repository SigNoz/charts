{{- if .Values.telemetryStoreMigrator.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "telemetryStoreMigrator.serviceAccountName" . }}
  labels:
    {{- include "telemetryStoreMigrator.labels" . | nindent 4 }}
  {{- with .Values.telemetryStoreMigrator.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- include "signoz.imagePullSecrets" . }}
{{- end -}}
